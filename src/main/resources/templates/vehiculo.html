<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO DE VEHÍCULO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        body {
            /* Mantiene el centrado vertical y horizontal */
            background-color: #e9ecef; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Padding general para pantallas pequeñas */
        }
        .form-container {
            /* Estilo de tarjeta moderna */
            max-width: 450px; /* Más estrecho para un look más compacto */
            width: 100%;
            padding: 2.5rem;
            border-radius: 1rem; /* Borde más redondeado */
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(151, 142, 142, 0.15); /* Sombra más pronunciada */
            border-top: 5px solid #1e242e; /* Barra superior de color primario */
        }
        h1 {
            /* Estilo para el título */
            font-weight: 600;
            color: #90b8b1 !important;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h1 class="text-center">REGISTRO DE VEHÍCULO</h1>
        
        <form data-th-object="${nuevoVehiculo}" data-th-action="@{/guardarVehiculo}" method="post" enctype="multipart/form-data">

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Patente</label>
                        <input type="text" class="form-control" placeholder="123" data-th-field="*{patente}" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Marca</label>
                        <input type="text" class="form-control" placeholder="Ej: Toyota" data-th-field="*{marca}"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Modelo</label>
                        <input type="text" class="form-control" placeholder="Ej: Corolla" data-th-field="*{modelo}"/>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Año</label>
                        <input type="number" class="form-control" placeholder="Ej: 2020" data-th-field="*{año}"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Color</label>
                        <input type="text" class="form-control" placeholder="Ej: Rojo" data-th-field="*{color}"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo</label>
                        <select class="form-select" data-th-field="*{tipoVehiculo}" required>
                            <option value="">Seleccione el tipo</option>
                            <option value="X">X (Base)</option>
                            <option value="LUXE">Luxe (+10%)</option>
                            <option value="PREMIUM">Premium (+20%)</option>
                        </select>
                    </div>
                </div>
            </div> <hr class="mt-4 mb-4">
            
            <button type="submit" class="btn btn-primary w-100 btn-lg">INGRESAR VEHICULO</button>

            <a data-th-href="@{/}" class="btn btn-outline-secondary w-100 mt-3">Volver a Inicio</a>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
