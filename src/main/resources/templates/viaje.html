<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Viaje</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<header>
    <h1>Registrar Viaje</h1>
      <p style="text-align:center; margin-top:10px; font-size:1.1em; font-weight:bold;">
        Viajes de <span style="color:#007bff;">Corta distancia</span>: $7.000,<br>
        Viajes de <span style="color:#28a745;">Media distancia</span>: $10.000,  <br>
        Viajes de <span style="color:#d39e00;">Larga distancia</span>: $20.000
    </p>
</header>

<main>
    <form th:object="${nuevoViaje}" th:action="@{/guardarViaje}" method="post">

        <!-- Vehículo (solo lectura) -->
        <label for="vehiculo">Vehículo (Patente)</label>
        <input type="text" id="vehiculo" name="vehiculo.patente" th:value="*{vehiculo.patente}" readonly>

        <!-- Usuario -->
        <label for="usuario">Usuario</label>
        <select id="usuario" name="usuario.dni" required>
            <option value="" disabled selected>Seleccione un usuario</option>
            <option th:each="u : ${listadoUsuario}" th:value="${u.dni}" 
                    th:text="${u.nombre + ' ' + u.apellido}"></option>
        </select>

       <!-- Tipo de viaje -->
        <label for="tipoViaje">Tipo de viaje</label>
        <select id="tipoViaje" name="tipoViaje" th:field="*{tipoViaje}" required>
            <option value="">Seleccione una opción</option>
            <option value="CORTA">Corta distancia</option>
            <option value="MEDIA">Media distancia</option>
            <option value="LARGA">Larga distancia</option>
        </select>

        <!-- Precio -->
        <input type="hidden" th:field="*{costo}">

        <!-- Fecha -->
        <label for="fechaViaje">Fecha del viaje</label>
        <input type="date" id="fechaViaje" name="fechaViaje" th:field="*{fechaViaje}" required>

        <br><br>
        <button type="submit" class="btn">REALIZAR VIAJE</button>
    </form>

    <div style="text-align:center; margin-top:20px;">
        <a href="/listarViajes" class="btn">VER LISTA DE VIAJES</a>
        <a href="/" class="btn">INICIO</a>
    </div>
</main>

<footer>
    <p>&copy; 2025 IES N.º6 - Todos los derechos reservados</p>
</footer>
</body>
</html>
