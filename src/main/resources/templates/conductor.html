<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Conductor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        /* Estilo personalizado opcional: centrar el formulario */
        .form-container {
            max-width: 550px; /* Limita el ancho del formulario */
            margin: 50px auto; /* Centra el contenedor horizontalmente */
            padding: 30px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15); /* Sombra más pronunciada */
            border-radius: 10px;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="form-container">
            <h1 class="text-center mb-4 text-success">🚦 FORMULARIO CONDUCTOR</h1>

            <form th:object="${nuevoConductor}" th:action="${band}?@{/modificarConductor}:@{/guardarConductor}" method="post">

                <div class="mb-3">
                    <label for="dni" class="form-label fw-bold">DNI</label>
                    <input type="text" class="form-control" 
                           th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'" 
                           id="dni" placeholder="Ingresar DNI sin puntos ni comas" th:field="*{dni}" required/>
                    <div th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="invalid-feedback">Error DNI</div>
                </div>

                <div class="mb-3">
                    <label for="nombre" class="form-label fw-bold">Nombre</label>
                    <input type="text" class="form-control" 
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" 
                           id="nombre" placeholder="Ingresar nombre" th:field="*{nombre}"/>
                    <div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="invalid-feedback">Error Nombre</div>
                </div>

                <div class="mb-3">
                    <label for="apellido" class="form-label fw-bold">Apellido</label>
                    <input type="text" class="form-control" 
                           th:classappend="${#fields.hasErrors('apellido')} ? 'is-invalid'" 
                           id="apellido" placeholder="Ingresar apellido" th:field="*{apellido}"/>
                    <div th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}" class="invalid-feedback">Error Apellido</div>
                </div>

                <div class="mb-3">
                    <label for="fechaNac" class="form-label fw-bold">Fecha de Nacimiento</label>
                    <input type="date" class="form-control" id="fechaNac" th:field="*{fechaNac}"/>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="estado" th:field="*{estado}"/>
                    <label class="form-check-label fw-bold" for="estado">Estado Activo (Conductor Habilitado)</label>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-person-badge-fill me-2"></i> INGRESAR CONDUCTOR
                    </button>
                </div>
                
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
