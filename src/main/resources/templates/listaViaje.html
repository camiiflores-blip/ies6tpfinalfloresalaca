<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Viajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background-color: #f8f9fa; 
        }
        main {
            padding: 20px;
        }
        .table-container {
            overflow-x: auto; /* Permite scroll horizontal en móviles si la tabla es muy ancha */
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    
    <div th:if="${correcto}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${correcto}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <header class="text-center mb-4">
        <h1 class="display-5 text-dark"><i class="bi bi-geo-alt-fill me-2"></i> Lista de Viajes Registrados</h1>
    </header>

    <main>
        <section class="table-container">
            <table class="table table-striped table-hover table-bordered caption-top">
                <caption>Total de Viajes: <span th:text="${#lists.size(listadoViajes)}"></span></caption>
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tipo de Viaje</th>
                        <th>Precio</th>
                        <th>Fecha</th>
                        <th>Usuario</th>
                        <th>Vehículo</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="Viaje: ${listadoViajes}">
                       <td th:text="${Viaje.idViaje}" class="fw-bold"></td>
                       <td>
                            <span th:text="${Viaje.tipoViaje}" 
                                th:classappend="${Viaje.tipoViaje == 'CORTA'} ? 'badge bg-primary' : (${Viaje.tipoViaje == 'MEDIA'} ? 'badge bg-success' : 'badge bg-warning text-dark')">
                            </span>
                       </td>
                       <td>
                           <span th:text="'$' + ${#numbers.formatDecimal(Viaje.costo, 0, 'POINT', 2, 'COMMA')}" class="text-success fw-bold"></span>
                       </td>
                       <td th:text="${Viaje.fechaViaje}"></td>
                       <td th:text="${Viaje.usuario.nombre + ' ' + Viaje.usuario.apellido}"></td>
                       <td th:text="${Viaje.vehiculo.patente}" class="text-uppercase text-danger"></td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(listadoViajes)}">
                        <td colspan="6" class="text-center text-muted">No hay viajes registrados en el sistema.</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <div class="mt-4 text-center">
            <a href="/realizarViajes" class="btn btn-secondary me-2">
                <i class="bi bi-arrow-left-circle-fill me-1"></i> Volver a Registrar
            </a>
            <a href="/" class="btn btn-info text-dark">
                <i class="bi bi-house-door-fill me-1"></i> INICIO
            </a>
        </div>
    </main>

    <footer class="text-center mt-5 py-3 text-muted border-top">
        <p class="mb-0">&copy; 2025 IES N°6 - Todos los derechos reservados</p>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
