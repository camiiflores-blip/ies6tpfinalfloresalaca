<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">

    <header>
         <h1> LISTA DE USUARIOS </h1>
    </header>
    
    <main>
        <section class="tabla-contenedor">

       
          <table class="table table-striped-columns table-primary table-dange">
              <thead>
                    <tr>
                       <th>DNI</th> 
                       <th>Apellido</th>
                       <th>Nombre</th>
                       <th>Fecha De Nacimiento</th>
                       <th>Correo Electronico</th>
                       <th>Telefono</th>
                       <th>Edicion</th>
                   </tr>
              </thead>
             </tbody>
                  <tr data-th-each="Usuario : ${listadoUsuario}">
                      <td th:text="${Usuario.dni}"></td>
                      <td th:text="${Usuario.apellido}"></td>
                      <td th:text="${Usuario.nombre}"></td>
                      <td th:text="${#temporals.format(Usuario.fechaDeNacimiento, 'dd/MM/yyyy')}"></td>
                      <td th:text="${Usuario.correoElectronico}"></td>
                      <td th:text="${Usuario.telefono}"></td>

                      <td>
                         <a data-th-href="@{'/eliminarUsuario/'+${Usuario.dni}}" class="btn">Borrar</a>
                         <a data-th-href="@{'/modificarUsuario/'+${Usuario.dni}}" class="btns">Modificar</a>
  
                      </td>
                  </tr>
             <tbody>
          </table>

           </div>
           <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        </section>
        <div class="botones">
            <a href="/usuario" class="btn">VOLVER</a>
            <a href="/" class="btn">INICIO</a>
        </div>


    </main>
</body>
</html>
