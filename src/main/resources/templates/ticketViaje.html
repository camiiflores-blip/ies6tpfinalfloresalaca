<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket del Viaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background-color: #f8f9fa; /* Fondo gris claro */
        }
        .ticket-container {
            max-width: 450px; /* Ancho típico de un recibo */
            margin: 50px auto;
        }
        .ticket-card {
            border: 2px dashed #0d6efd; /* Borde de ticket simulado */
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            background-color: #ffffff;
            font-family: monospace, sans-serif; /* Fuente tipo recibo */
        }
        .ticket-header {
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .data-row {
            padding: 8px 0;
            border-bottom: 1px dotted #dee2e6;
        }
        .final-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #28a745; /* Color verde para el precio */
            margin-top: 20px;
            padding-top: 10px;
            border-top: 2px solid #0d6efd; /* Separador grueso */
        }
    </style>
</head>
<body>

<div class="container ticket-container">
    
    <header class="text-center mb-4">
        <h1 class="text-primary"><i class="bi bi-ticket-detailed-fill me-2"></i> Ticket del Viaje</h1>
    </header>

    <main>
        <div class="ticket-card">
            
            <div class="ticket-header text-center">
                <h2 class="h4 mb-0 text-dark">Detalle del Servicio</h2>
                <small class="text-muted">¡Gracias por viajar con nosotros!</small>
            </div>

            <div class="data-row d-flex justify-content-between">
                <strong>ID Viaje:</strong>
                <span th:text="${viaje.idViaje}" class="text-end"></span>
            </div>

            <div class="data-row d-flex justify-content-between">
                <strong>Vehículo (Patente):</strong>
                <span th:text="${viaje.vehiculo.patente}" class="text-end text-uppercase text-danger"></span>
            </div>

            <div class="data-row d-flex justify-content-between">
                <strong>Usuario:</strong>
                <span th:text="${viaje.usuario.nombre + ' ' + viaje.usuario.apellido}" class="text-end"></span>
            </div>

            <div class="data-row d-flex justify-content-between">
                <strong>Tipo de Viaje:</strong>
                <span th:text="${viaje.tipoViaje}" class="text-end badge bg-info text-dark"></span>
            </div>

            <div class="data-row d-flex justify-content-between">
                <strong>Fecha:</strong>
                <span th:text="${viaje.fechaViaje}" class="text-end"></span>
            </div>

            <div class="data-row final-price d-flex justify-content-between align-items-center">
                <span>Precio Final:</span>
                <span th:text="'$' + ${#numbers.formatDecimal(viaje.costo, 0, 'POINT', 2, 'COMMA')}" class="text-end"></span>
            </div>
            <div class="d-grid gap-2 mt-4 text-center">
                <a href="/" class="btn btn-primary">
                    <i class="bi bi-house-door-fill me-1"></i> Volver al Inicio
                </a>
                <a href="/listarViajes" class="btn btn-outline-secondary">
                    <i class="bi bi-list-task me-1"></i> Ver Listado de Viajes
                </a>
            </div>
            
            <p class="text-center mt-3 text-muted" style="font-size: 0.8rem;">
                Comprobante no válido como factura fiscal.
            </p>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
