<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        /* Estilo personalizado opcional: centrar el formulario */
        .form-container {
            max-width: 500px; /* Limita el ancho del formulario */
            margin: 50px auto; /* Centra el contenedor horizontalmente */
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Sombra ligera */
            border-radius: 8px;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container">
        <div class="form-container">
            <h1 class="text-center mb-4 text-primary">👤 Registro de Usuario</h1>

            <form data-th-object="${nuevoUsuario}" data-th-action="${band}?@{/modificarUsuario}:@{/guardarUsuario}" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label for="dniInput" class="form-label">DNI</label>
                    <input type="text" class="form-control" id="dniInput" placeholder="Ingresar DNI sin puntos ni comas" data-th-field="*{dni}" required>
                    <div class="form-text">Campo obligatorio.</div>
                </div>

                <div class="mb-3">
                    <label for="nombreInput" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombreInput" placeholder="Ingresar nombre" data-th-field="*{nombre}">
                </div>

                <div class="mb-3">
                    <label for="apellidoInput" class="form-label">Apellido</label>
                    <input type="text" class="form-control" id="apellidoInput" placeholder="Ingresar apellido" data-th-field="*{apellido}">
                </div>

                <div class="mb-3">
                    <label for="fechaNacimientoInput" class="form-label">Fecha de Nacimiento</label>
                    <input type="date" class="form-control" id="fechaNacimientoInput" data-th-field="*{fechaDeNacimiento}">
                </div>

                <div class="mb-3">
                    <label for="correoInput" class="form-label">Correo Electrónico</label>
                    <input type="email" class="form-control" id="correoInput" placeholder="Ingresar correo electrónico (ej: usuario@dominio.com)" data-th-field="*{correoElectronico}">
                </div>

                <div class="mb-3">
                    <label for="telefonoInput" class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" id="telefonoInput" placeholder="Ingresar teléfono" data-th-field="*{telefono}">
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        INGRESAR USUARIO
                    </button>
                </div>

            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
